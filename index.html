<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Together — Anish & Venkatesh</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --an: #0A84FF;
    --ve: #FF9F0A;
    --match: #FFD60A;
    --bg: #0a0a0f;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
  }

  body {
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  .fs-btn {
    position: fixed; top: 14px; right: 14px; z-index: 999;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; font-size: 16px; transition: background .2s;
  }
  .fs-btn:hover { background: rgba(255,255,255,0.18); }

  .clocks { display: flex; flex-direction: column; }
  .app.land .clocks { flex-direction: row; }

  .clock-panel {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.6rem 1rem; min-height: 220px;
  }
  .clock-panel.an { background: radial-gradient(ellipse at 50% 0%, rgba(10,132,255,0.12) 0%, transparent 65%); }
  .clock-panel.ve { background: radial-gradient(ellipse at 50% 0%, rgba(255,159,10,0.12) 0%, transparent 65%); }

  .tz-label {
    font-size: 11px; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; margin-bottom: .65rem;
  }
  .an .tz-label { color: var(--an); }
  .ve .tz-label { color: var(--ve); }

  .clock-face { position: relative; width: 120px; height: 120px; margin-bottom: .75rem; }
  .clock-face svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .clock-dot {
    position: absolute; top: 50%; left: 50%;
    width: 8px; height: 8px; border-radius: 50%;
    transform: translate(-50%,-50%); z-index: 5;
  }
  .an .clock-dot { background: var(--an); }
  .ve .clock-dot { background: var(--ve); }

  .dig-time { font-size: 1.9rem; font-weight: 300; letter-spacing: -.02em; line-height: 1; }
  .an .dig-time { color: var(--an); }
  .ve .dig-time { color: var(--ve); }
  .dig-date { font-size: 12px; color: rgba(255,255,255,.55); margin-top: 4px; }
  .dig-tz { font-size: 10px; color: rgba(255,255,255,.3); margin-top: 2px; letter-spacing: .05em; }

  .divider-h { height: 0.5px; background: rgba(255,255,255,.1); margin: 0 1.5rem; }
  .divider-v { width: 0.5px; background: rgba(255,255,255,.1); margin: 1.5rem 0; align-self: stretch; }

  .sched { border-top: 0.5px solid rgba(255,255,255,.08); padding: 1.3rem; }
  .sec-title {
    font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    color: rgba(255,255,255,.4); text-align: center; margin-bottom: 1rem;
  }

  .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .name-btn {
    padding: .75rem 1rem; border-radius: 14px; border: 1.5px solid;
    background: transparent; cursor: pointer; font-size: 14px; font-weight: 500;
    color: #fff; transition: background .2s; text-align: center;
  }
  .name-btn.an { border-color: var(--an); }
  .name-btn.an:hover { background: rgba(10,132,255,.14); }
  .name-btn.ve { border-color: var(--ve); }
  .name-btn.ve:hover { background: rgba(255,159,10,.14); }
  .name-btn .sub { font-size: 10px; opacity: .45; display: block; margin-top: 2px; font-weight: 400; }

  .slot-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .slot-col-head {
    font-size: 10px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; margin-bottom: 6px; text-align: center;
  }
  .an-h { color: var(--an); } .ve-h { color: var(--ve); }
  .slot-list { display: flex; flex-direction: column; gap: 5px; min-height: 24px; }
  .slot-chip {
    padding: 5px 8px; border-radius: 9px; font-size: 11px; font-weight: 500;
    display: flex; align-items: center; justify-content: space-between;
    gap: 4px; border: 1px solid transparent;
  }
  .slot-chip.an { background: rgba(10,132,255,.12); border-color: rgba(10,132,255,.22); color: #6ABAFF; }
  .slot-chip.ve { background: rgba(255,159,10,.12); border-color: rgba(255,159,10,.22); color: #FFC46B; }
  .chip-date { font-size: 10px; opacity: .58; margin-right: 2px; }
  /* Midnight-crossing indicator */
  .chip-midnight {
    font-size: 9px; opacity: .6; margin-left: 2px;
    background: rgba(255,255,255,.1); border-radius: 4px; padding: 1px 4px;
  }
  .rm-btn { background: none; border: none; cursor: pointer; opacity: .4; color: inherit; padding: 0; font-size: 13px; line-height: 1; }
  .rm-btn:hover { opacity: 1; }
  .empty-hint { font-size: 11px; color: rgba(255,255,255,.28); padding: 3px 0; }

  .matches-box {
    background: rgba(255,214,10,.05);
    border: 1px solid rgba(255,214,10,.18);
    border-radius: 16px; padding: 1.1rem;
  }
  .match-title {
    font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--match); margin-bottom: .75rem; display: flex; align-items: center; gap: 6px;
  }
  .match-card {
    background: rgba(255,255,255,.04); border-radius: 11px;
    padding: .85rem; margin-bottom: .6rem; border: 0.5px solid rgba(255,255,255,.07);
  }
  .match-card:last-child { margin-bottom: 0; }
  .match-date {
    font-size: 11px; color: rgba(255,214,10,.65); font-weight: 500;
    margin-bottom: .5rem; display: flex; align-items: center; gap: 5px;
  }
  .match-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .match-row:last-child { margin-bottom: 0; }
  .tz-badge {
    font-size: 10px; font-weight: 600; letter-spacing: .04em;
    padding: 2px 7px; border-radius: 6px; flex-shrink: 0; width: 38px; text-align: center;
  }
  .edt-b { background: rgba(10,132,255,.18); color: var(--an); }
  .ist-b { background: rgba(255,159,10,.18); color: var(--ve); }
  .match-range { font-size: 13px; font-weight: 500; }
  .edt-r { color: #6ABAFF; } .ist-r { color: #FFC46B; }
  .no-match { font-size: 13px; color: rgba(255,255,255,.3); text-align: center; padding: .75rem 0; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,.8); align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1c1c1e; border-radius: 22px; padding: 1.5rem;
    width: 330px; max-width: 95vw; border: 0.5px solid rgba(255,255,255,.12);
    max-height: 92vh; overflow-y: auto;
  }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .9rem; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close {
    background: rgba(255,255,255,.1); border: none; color: #fff;
    width: 29px; height: 29px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }

  .date-scroll {
    display: flex; gap: 7px; overflow-x: auto;
    padding-bottom: 4px; margin-bottom: .9rem; scrollbar-width: none;
  }
  .date-scroll::-webkit-scrollbar { display: none; }
  .date-card {
    flex-shrink: 0; width: 58px; padding: 8px 4px; border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,.1); background: transparent;
    cursor: pointer; text-align: center; transition: all .15s; color: #fff;
  }
  .date-card:hover { border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.06); }
  .date-card.sel-an { border-color: var(--an); background: rgba(10,132,255,.18); }
  .date-card.sel-ve { border-color: var(--ve); background: rgba(255,159,10,.18); }
  .date-card .dnum { font-size: 18px; font-weight: 500; line-height: 1; }
  .date-card .dmon { font-size: 10px; opacity: .5; margin-top: 2px; }
  .date-card .dwk { font-size: 9px; opacity: .38; margin-top: 1px; text-transform: uppercase; letter-spacing: .05em; }
  .date-card.today .dwk { color: var(--match); opacity: .95; }

  .ft-row { display: flex; gap: 6px; margin-bottom: .85rem; }
  .ft-btn {
    flex: 1; padding: 7px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,.12); background: transparent;
    color: rgba(255,255,255,.38); font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s;
  }
  .ft-btn.active { background: rgba(255,255,255,.12); color: #fff; border-color: rgba(255,255,255,.3); }

  .clock-wheel { position: relative; width: 200px; height: 200px; margin: 0 auto .85rem; }
  .cw-ring {
    position: absolute; inset: 0; border-radius: 50%;
    background: #2c2c2e; border: 2px solid rgba(255,255,255,.08);
  }
  .cw-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); text-align: center; pointer-events: none;
  }
  .cw-num { font-size: 1.6rem; font-weight: 300; line-height: 1; }
  .cw-sub { font-size: 11px; color: rgba(255,255,255,.38); margin-top: 2px; }
  .h-num {
    position: absolute; width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; cursor: pointer;
    color: rgba(255,255,255,.4); transition: all .15s; transform: translate(-50%,-50%);
  }
  .h-num:hover { color: #fff; background: rgba(255,255,255,.1); }
  .h-num.sel { font-weight: 700; font-size: 13px; color: #fff; }

  .min-btns { display: flex; gap: 7px; justify-content: center; margin-bottom: .85rem; }
  .min-btn {
    flex: 1; padding: 7px 0; border-radius: 10px;
    border: 1px solid rgba(255,255,255,.11); background: transparent;
    color: rgba(255,255,255,.42); font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s;
  }
  .min-btn:hover { color: #fff; }
  .min-btn.sel { color: #fff; font-weight: 600; }

  .ap-row { display: flex; background: #2c2c2e; border-radius: 10px; padding: 3px; gap: 3px; margin-bottom: .85rem; }
  .ap-btn {
    flex: 1; padding: 7px; border: none; border-radius: 8px;
    background: transparent; color: rgba(255,255,255,.38);
    font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s;
  }
  .ap-btn.sel { background: rgba(255,255,255,.14); color: #fff; }

  .preview {
    background: rgba(255,255,255,.05); border-radius: 11px;
    padding: .75rem; margin-bottom: .9rem; text-align: center;
  }
  .preview-date { font-size: 11px; color: rgba(255,255,255,.4); margin-bottom: 3px; }
  .preview-range { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
  .preview-dur { font-size: 12px; color: rgba(255,255,255,.35); }
  .preview-warn { font-size: 11px; color: #FF453A; margin-top: 3px; min-height: 16px; }
  /* Green info for midnight crossing */
  .preview-info { font-size: 11px; color: #30D158; margin-top: 3px; min-height: 16px; }

  .add-btn {
    width: 100%; padding: 12px; border-radius: 12px;
    border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .add-btn:hover { opacity: .88; }
</style>
</head>
<body>

<div class="app port" id="app">

  <button class="fs-btn" id="fsBtn" title="Toggle portrait / landscape">
    <i class="ti ti-rotate"></i>
  </button>

  <div class="clocks" id="clocks">
    <div class="clock-panel an">
      <div class="tz-label">🇺🇸 Anish · Florida</div>
      <div class="clock-face">
        <svg id="asvg" viewBox="0 0 120 120"></svg>
        <div class="clock-dot"></div>
      </div>
      <div class="dig-time" id="adt">--:--:--</div>
      <div class="dig-date" id="add">--</div>
      <div class="dig-tz">EDT · UTC −4:00</div>
    </div>
    <div class="divider-h" id="divider"></div>
    <div class="clock-panel ve">
      <div class="tz-label">🇮🇳 Venkatesh · India</div>
      <div class="clock-face">
        <svg id="vsvg" viewBox="0 0 120 120"></svg>
        <div class="clock-dot"></div>
      </div>
      <div class="dig-time" id="vdt">--:--:--</div>
      <div class="dig-date" id="vdd">--</div>
      <div class="dig-tz">IST · UTC +5:30</div>
    </div>
  </div>

  <div class="sched">
    <div class="sec-title">
      <i class="ti ti-calendar-time" style="font-size:13px;vertical-align:-2px;margin-right:5px"></i>
      Weekly Study Availability
    </div>

    <div class="name-grid">
      <button class="name-btn an" onclick="openPicker('anish')">
        <i class="ti ti-user" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>Anish
        <span class="sub">Add free time · EDT</span>
      </button>
      <button class="name-btn ve" onclick="openPicker('venkatesh')">
        <i class="ti ti-user" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>Venkatesh
        <span class="sub">Add free time · IST</span>
      </button>
    </div>

    <div class="slot-cols">
      <div>
        <div class="slot-col-head an-h">
          <i class="ti ti-clock" style="font-size:11px;vertical-align:-1px"></i> Anish (EDT)
        </div>
        <div class="slot-list" id="anList"></div>
      </div>
      <div>
        <div class="slot-col-head ve-h">
          <i class="ti ti-clock" style="font-size:11px;vertical-align:-1px"></i> Venkatesh (IST)
        </div>
        <div class="slot-list" id="veList"></div>
      </div>
    </div>

    <div class="matches-box">
      <div class="match-title">
        <i class="ti ti-bolt" style="font-size:13px"></i>
        Common Study Windows
      </div>
      <div id="matchOut">
        <div class="no-match">Add time ranges above to find common windows</div>
      </div>
    </div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">Add availability</span>
      <button class="modal-close" onclick="closePicker()">
        <i class="ti ti-x" style="font-size:13px"></i>
      </button>
    </div>

    <div class="date-scroll" id="dateScroll"></div>

    <div class="ft-row">
      <button class="ft-btn active" id="btnFrom" onclick="setPicking('from')">
        <i class="ti ti-player-play" style="font-size:11px;vertical-align:-1px"></i> From
      </button>
      <button class="ft-btn" id="btnTo" onclick="setPicking('to')">
        <i class="ti ti-player-stop" style="font-size:11px;vertical-align:-1px"></i> To
      </button>
    </div>

    <div class="clock-wheel">
      <div class="cw-ring" id="cwRing"></div>
      <div class="cw-center">
        <div class="cw-num" id="cwNum">9</div>
        <div class="cw-sub" id="cwSub">From · AM</div>
      </div>
    </div>

    <div class="min-btns">
      <button class="min-btn sel" id="mb0"  onclick="setMin(0)">:00</button>
      <button class="min-btn"     id="mb15" onclick="setMin(15)">:15</button>
      <button class="min-btn"     id="mb30" onclick="setMin(30)">:30</button>
      <button class="min-btn"     id="mb45" onclick="setMin(45)">:45</button>
    </div>

    <div class="ap-row">
      <button class="ap-btn sel" id="amBtn" onclick="setAP('AM')">AM</button>
      <button class="ap-btn"     id="pmBtn" onclick="setAP('PM')">PM</button>
    </div>

    <div class="preview">
      <div class="preview-date"  id="prevDate">—</div>
      <div class="preview-range" id="prevRange">— → —</div>
      <div class="preview-dur"   id="prevDur">Pick from &amp; to times</div>
      <div class="preview-warn"  id="prevWarn"></div>
      <div class="preview-info"  id="prevInfo"></div>
    </div>

    <button class="add-btn" id="addBtn" onclick="addSlot()">
      <i class="ti ti-plus" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>
      Add This Window
    </button>
  </div>
</div>

<script>
  const EDT_TZ  = 'America/New_York';
  const IST_TZ  = 'Asia/Kolkata';
  const EDT_UTC = -240;   // EDT = UTC−4  (minutes)
  const IST_UTC =  330;   // IST = UTC+5:30

  const MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const WDAYS      = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const WDAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  let isLand = false, curUser = null, picking = 'from', selDateKey = null;
  let pState = { from: { h:9, m:0, ap:'AM' }, to: { h:11, m:0, ap:'AM' } };
  let slots  = { anish: [], venkatesh: [] };

  /* ── DATE HELPERS ── */
  function getWeekDates() {
    const days = [], now = new Date();
    for (let i = 0; i < 7; i++) {
      const d = new Date(now); d.setDate(now.getDate() + i); days.push(d);
    }
    return days;
  }
  function dateKey(d) { return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate(); }
  function dateLabel(d) { return WDAYS_FULL[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS[d.getMonth()]; }
  function dateShort(d) { return d.getDate() + ' ' + MONTHS[d.getMonth()] + ' · ' + WDAYS[d.getDay()]; }

  /** Add N days to a dateKey string, returns new dateKey */
  function addDaysToKey(key, n) {
    const [y, mo, d] = key.split('-').map(Number);
    const dt = new Date(y, mo - 1, d);
    dt.setDate(dt.getDate() + n);
    return dateKey(dt);
  }
  function dateKeyToDate(key) {
    const [y, mo, d] = key.split('-').map(Number);
    return new Date(y, mo - 1, d);
  }

  /* ── TIME HELPERS ── */
  function h12to24(h, ap) { return ap === 'AM' ? (h === 12 ? 0 : h) : (h === 12 ? 12 : h + 12); }
  function toMins(h, m, ap) { return h12to24(h, ap) * 60 + m; }
  function minsToLabel(mins) {
    const t = ((mins % 1440) + 1440) % 1440;
    const h24 = Math.floor(t / 60), m = t % 60;
    const ap = h24 < 12 ? 'AM' : 'PM';
    const h12 = h24 % 12 === 0 ? 12 : h24 % 12;
    return h12 + ':' + (m < 10 ? '0' : '') + m + ' ' + ap;
  }
  function durStr(mins) {
    const h = Math.floor(mins / 60), m = mins % 60;
    return h && m ? h + 'h ' + m + 'm' : h ? h + 'h' : m + 'm';
  }

  /* ── CLOCKS ── */
  function drawClock(svgId, tz, col) {
    const now = new Date();
    const str = now.toLocaleString('en-US', { timeZone: tz, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const [h, m, s] = str.split(':').map(Number);
    const cx = 60, cy = 60, R = 57;
    const rad = a => (a - 90) * Math.PI / 180;
    const pt  = (a, r) => ({ x: cx + r * Math.cos(rad(a)), y: cy + r * Math.sin(rad(a)) });
    const sA = (s / 60) * 360;
    const mA = ((m + s / 60) / 60) * 360;
    const hA = (((h % 12) + m / 60) / 12) * 360;
    let o = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;
    for (let i = 0; i < 60; i++) {
      const a = (i / 60) * 360, mj = i % 5 === 0;
      const p1 = pt(a, R - 1), p2 = pt(a, R - (mj ? 9 : 4));
      o += `<line x1="${p1.x.toFixed(1)}" y1="${p1.y.toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${p2.y.toFixed(1)}" stroke="rgba(255,255,255,${mj ? .45 : .15})" stroke-width="${mj ? 1.5 : .8}" stroke-linecap="round"/>`;
    }
    const hp = pt(hA, 34), mp = pt(mA, 46), sp = pt(sA, 52);
    o += `<line x1="${cx}" y1="${cy}" x2="${hp.x.toFixed(1)}" y2="${hp.y.toFixed(1)}" stroke="${col}" stroke-width="2.8" stroke-linecap="round"/>`;
    o += `<line x1="${cx}" y1="${cy}" x2="${mp.x.toFixed(1)}" y2="${mp.y.toFixed(1)}" stroke="${col}" stroke-width="1.8" stroke-linecap="round" opacity=".82"/>`;
    o += `<line x1="${cx}" y1="${cy}" x2="${sp.x.toFixed(1)}" y2="${sp.y.toFixed(1)}" stroke="#FF453A" stroke-width="1.2" stroke-linecap="round"/>`;
    o += `<circle cx="${cx}" cy="${cy}" r="3" fill="${col}"/>`;
    document.getElementById(svgId).innerHTML = o;
  }

  function updateClocks() {
    const now = new Date();
    [['a', EDT_TZ, '#0A84FF', 'adt', 'add'], ['v', IST_TZ, '#FF9F0A', 'vdt', 'vdd']].forEach(([p, tz, col, tid, did]) => {
      drawClock(p + 'svg', tz, col);
      document.getElementById(tid).textContent = now.toLocaleString('en-US', { timeZone: tz, hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
      document.getElementById(did).textContent = now.toLocaleString('en-US', { timeZone: tz, weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    });
  }
  setInterval(updateClocks, 1000); updateClocks();

  /* ── ORIENTATION TOGGLE ── */
  document.getElementById('fsBtn').addEventListener('click', function () {
    isLand = !isLand;
    const div = document.getElementById('divider');
    document.getElementById('app').classList.toggle('land', isLand);
    document.getElementById('clocks').style.flexDirection = isLand ? 'row' : 'column';
    div.className = isLand ? 'divider-v' : 'divider-h';
    this.innerHTML = isLand ? '<i class="ti ti-device-mobile"></i>' : '<i class="ti ti-rotate"></i>';
  });

  /* ── DATE SCROLL ── */
  function buildDateScroll(cls) {
    const ds = document.getElementById('dateScroll');
    ds.innerHTML = '';
    getWeekDates().forEach((d, i) => {
      const key = dateKey(d);
      const btn = document.createElement('button');
      btn.className = 'date-card' + (i === 0 ? ' today' : '') + (key === selDateKey ? ' sel-' + cls : '');
      btn.innerHTML = `<div class="dnum">${d.getDate()}</div><div class="dmon">${MONTHS[d.getMonth()]}</div><div class="dwk">${i === 0 ? 'today' : WDAYS[d.getDay()]}</div>`;
      btn.addEventListener('click', () => { selDateKey = key; buildDateScroll(cls); updatePreview(); });
      ds.appendChild(btn);
    });
  }

  /* ── CLOCK WHEEL ── */
  function buildWheel() {
    const ring = document.getElementById('cwRing');
    ring.innerHTML = '';
    const col = curUser === 'anish' ? '#0A84FF' : '#FF9F0A';
    const cur = pState[picking];
    for (let h = 1; h <= 12; h++) {
      const ang = ((h / 12) * 360 - 90) * Math.PI / 180;
      const r = 84, cx = 100, cy = 100;
      const x = cx + r * Math.cos(ang), y = cy + r * Math.sin(ang);
      const el = document.createElement('div');
      el.className = 'h-num' + (h === cur.h ? ' sel' : '');
      el.textContent = h;
      el.style.cssText = `left:${x}px;top:${y}px`;
      if (h === cur.h) { el.style.background = col + '44'; el.style.color = col; }
      el.addEventListener('click', () => { pState[picking].h = h; buildWheel(); updatePreview(); });
      ring.appendChild(el);
    }
    document.getElementById('cwNum').textContent = cur.h;
    document.getElementById('cwNum').style.color = col;
    document.getElementById('cwSub').textContent = (picking === 'from' ? 'From' : 'To') + ' · ' + cur.ap;
    [0, 15, 30, 45].forEach(m => {
      const b = document.getElementById('mb' + m);
      const sel = m === cur.m;
      b.className = 'min-btn' + (sel ? ' sel' : '');
      b.style.background = sel ? col + '33' : '';
      b.style.borderColor = sel ? col + '66' : '';
    });
    document.getElementById('amBtn').className = 'ap-btn' + (cur.ap === 'AM' ? ' sel' : '');
    document.getElementById('pmBtn').className = 'ap-btn' + (cur.ap === 'PM' ? ' sel' : '');
  }

  function setPicking(w) {
    picking = w;
    document.getElementById('btnFrom').className = 'ft-btn' + (w === 'from' ? ' active' : '');
    document.getElementById('btnTo').className   = 'ft-btn' + (w === 'to'   ? ' active' : '');
    buildWheel(); updatePreview();
  }
  function setMin(m) { pState[picking].m = m; buildWheel(); updatePreview(); }
  function setAP(ap) { pState[picking].ap = ap; buildWheel(); updatePreview(); }

  /* ── PREVIEW ── */
  function updatePreview() {
    const f = pState.from, t = pState.to;
    const fm = toMins(f.h, f.m, f.ap), tm = toMins(t.h, t.m, t.ap);
    const crossesMidnight = tm < fm; // "to" is earlier in the day than "from"

    const dateDisp = selDateKey
      ? dateLabel(dateKeyToDate(selDateKey))
      : 'No date selected';

    document.getElementById('prevDate').textContent = dateDisp;
    document.getElementById('prevRange').textContent = minsToLabel(fm) + ' → ' + minsToLabel(tm);
    document.getElementById('prevWarn').textContent = '';
    document.getElementById('prevInfo').textContent = '';

    if (!selDateKey) {
      document.getElementById('prevWarn').textContent = 'Select a date above';
      document.getElementById('prevDur').textContent = '';
      return;
    }
    if (fm === tm) {
      document.getElementById('prevWarn').textContent = 'From and To cannot be the same';
      document.getElementById('prevDur').textContent = '';
      return;
    }

    if (crossesMidnight) {
      // e.g. 8 PM → 1 AM = 8 PM → midnight + midnight → 1 AM
      const dur = (1440 - fm) + tm;
      document.getElementById('prevDur').textContent = durStr(dur) + ' window';
      document.getElementById('prevInfo').textContent = '🌙 Crosses midnight — spans into next day';
    } else {
      const dur = tm - fm;
      document.getElementById('prevDur').textContent = durStr(dur) + ' window';
    }
  }

  /* ── OPEN / CLOSE MODAL ── */
  function openPicker(user) {
    curUser = user; picking = 'from';
    pState = { from: { h:9, m:0, ap:'AM' }, to: { h:11, m:0, ap:'AM' } };
    selDateKey = dateKey(new Date());
    const col = user === 'anish' ? '#0A84FF' : '#FF9F0A';
    document.getElementById('modalTitle').textContent = (user === 'anish' ? 'Anish (EDT)' : 'Venkatesh (IST)') + ' — Add Free Time';
    document.getElementById('modalTitle').style.color = col;
    document.getElementById('addBtn').style.cssText = `background:${col};color:#fff`;
    buildDateScroll(user === 'anish' ? 'an' : 've');
    buildWheel(); updatePreview();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closePicker() {
    document.getElementById('modalOverlay').classList.remove('open');
    curUser = null;
  }

  document.getElementById('modalOverlay').addEventListener('click', function (e) {
    if (e.target === this) closePicker();
  });

  /* ── ADD SLOT ── */
  function addSlot() {
    if (!selDateKey) {
      document.getElementById('prevWarn').textContent = 'Please select a date first'; return;
    }
    const f = pState.from, t = pState.to;
    const fm = toMins(f.h, f.m, f.ap), tm = toMins(t.h, t.m, t.ap);
    if (fm === tm) return;

    const dateObj = dateKeyToDate(selDateKey);
    const crossesMidnight = tm < fm;

    if (crossesMidnight) {
      // Split into two segments:
      // Segment 1: fromM → 1439 (end of day) on selDateKey
      // Segment 2: 0 → toM on selDateKey + 1 day
      const nextDateKey = addDaysToKey(selDateKey, 1);
      const nextDateObj = dateKeyToDate(nextDateKey);

      // Segment 1: evening portion
      slots[curUser].push({
        dateKey: selDateKey,
        dateLabel: dateShort(dateObj),
        dateFull: dateLabel(dateObj),
        fromM: fm,
        toM: 1440,          // treat midnight as 1440 for overlap logic
        crossPart: 'start'
      });
      // Segment 2: early-morning portion
      slots[curUser].push({
        dateKey: nextDateKey,
        dateLabel: dateShort(nextDateObj),
        dateFull: dateLabel(nextDateObj),
        fromM: 0,
        toM: tm,
        crossPart: 'end'
      });
    } else {
      slots[curUser].push({
        dateKey: selDateKey,
        dateLabel: dateShort(dateObj),
        dateFull: dateLabel(dateObj),
        fromM: fm,
        toM: tm
      });
    }

    slots[curUser].sort((a, b) =>
      a.dateKey === b.dateKey ? a.fromM - b.fromM : a.dateKey.localeCompare(b.dateKey)
    );
    renderSlots(); computeMatches(); closePicker();
  }

  /* ── REMOVE SLOT ── */
  function removeSlot(user, idx) {
    slots[user].splice(idx, 1);
    renderSlots(); computeMatches();
  }

  /* ── RENDER SLOTS ── */
  function renderSlots() {
    [{ u: 'anish', id: 'anList', cls: 'an' }, { u: 'venkatesh', id: 'veList', cls: 've' }].forEach(({ u, id, cls }) => {
      const el = document.getElementById(id);
      el.innerHTML = '';
      if (!slots[u].length) {
        el.innerHTML = '<div class="empty-hint">No times added yet</div>'; return;
      }
      slots[u].forEach((s, idx) => {
        const chip = document.createElement('div');
        chip.className = 'slot-chip ' + cls;
        // For midnight-split display: show 1440 as "12:00 AM (next)"
        const toLabel = s.toM === 1440 ? '12:00 AM' : minsToLabel(s.toM);
        const midnightTag = s.crossPart === 'start' ? '<span class="chip-midnight">→ next day</span>'
                          : s.crossPart === 'end'   ? '<span class="chip-midnight">from prev</span>'
                          : '';
        chip.innerHTML = `<span><span class="chip-date">${s.dateLabel}</span>${minsToLabel(s.fromM)} → ${toLabel}${midnightTag}</span>
          <button class="rm-btn" onclick="removeSlot('${u}',${idx})" title="Remove">
            <i class="ti ti-x" style="font-size:11px"></i>
          </button>`;
        el.appendChild(chip);
      });
    });
  }

  /* ── COMPUTE MATCHES ── */
  /*
    Key fix: overlap is now done in ABSOLUTE UTC minutes anchored to a calendar date.
    Each slot is stored with a dateKey. We convert fromM/toM to an absolute UTC minute value:
      absUtcFrom = dayOffset * 1440 + localMinutes - tzOffset
    This correctly handles cross-midnight slots (toM === 1440 = midnight of next day).
  */

  // Map a dateKey to a stable day index (days since epoch)
  function dayIndex(key) {
    const [y, mo, d] = key.split('-').map(Number);
    return Math.floor(new Date(y, mo - 1, d).getTime() / 86400000);
  }

  function slotsToAbsUtc(slot, tzOffset) {
    // Returns { absFrom, absTo } in "absolute UTC minutes" (day-anchored)
    const base = dayIndex(slot.dateKey) * 1440;
    return {
      absFrom: base + slot.fromM - tzOffset,
      absTo:   base + slot.toM   - tzOffset
    };
  }

  function computeMatches() {
    const out = document.getElementById('matchOut');
    if (!slots.anish.length || !slots.venkatesh.length) {
      const msg = (slots.anish.length || slots.venkatesh.length)
        ? 'Add times for both people to find windows'
        : 'Add time ranges above to find common windows';
      out.innerHTML = `<div class="no-match">${msg}</div>`;
      return;
    }

    const results = [];

    slots.anish.forEach(a => {
      const aAbs = slotsToAbsUtc(a, EDT_UTC);

      slots.venkatesh.forEach(v => {
        const vAbs = slotsToAbsUtc(v, IST_UTC);

        const s = Math.max(aAbs.absFrom, vAbs.absFrom);
        const e = Math.min(aAbs.absTo,   vAbs.absTo);
        if (e - s < 15) return; // less than 15 min overlap — skip

        const dur = e - s;

        // Convert overlap back to local times
        // EDT local = UTC + EDT_UTC  (EDT_UTC is negative: −240)
        const edtF = ((s + EDT_UTC) % 1440 + 1440) % 1440;
        const edtT = ((e + EDT_UTC) % 1440 + 1440) % 1440;
        const istF = ((s + IST_UTC) % 1440 + 1440) % 1440;
        const istT = ((e + IST_UTC) % 1440 + 1440) % 1440;

        // Determine the wall-clock date of the overlap in UTC for display
        const overlapDayIdx = Math.floor(s / 1440);
        const overlapDate = new Date(overlapDayIdx * 86400000);
        const overlapDateStr = dateLabel(overlapDate);

        // For the card header, show Anish's local date (most natural for him)
        const edtDayIdx  = Math.floor((s + EDT_UTC) / 1440);
        const edtDateObj = new Date(edtDayIdx * 86400000);
        const edtDateStr = dateLabel(edtDateObj);

        results.push({ edtF, edtT, istF, istT, dur, dateLabel: edtDateStr });
      });
    });

    if (!results.length) {
      out.innerHTML = '<div class="no-match">No overlapping windows found — try adding more times</div>';
      return;
    }

    // Deduplicate by stringifying key fields
    const seen = new Set();
    const deduped = results.filter(r => {
      const key = `${r.dateLabel}|${r.edtF}|${r.edtT}`;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });

    out.innerHTML = deduped.map(r => `
      <div class="match-card">
        <div class="match-date">
          <i class="ti ti-calendar" style="font-size:11px"></i>
          ${r.dateLabel} &nbsp;·&nbsp; ${durStr(r.dur)}
        </div>
        <div class="match-row">
          <span class="tz-badge edt-b">EDT</span>
          <span class="match-range edt-r">${minsToLabel(r.edtF)} → ${minsToLabel(r.edtT)}</span>
          <span style="font-size:10px;color:rgba(255,255,255,.3);margin-left:auto">Anish</span>
        </div>
        <div class="match-row">
          <span class="tz-badge ist-b">IST</span>
          <span class="match-range ist-r">${minsToLabel(r.istF)} → ${minsToLabel(r.istT)}</span>
          <span style="font-size:10px;color:rgba(255,255,255,.3);margin-left:auto">Venkatesh</span>
        </div>
      </div>`).join('');
  }

  renderSlots();
</script>
